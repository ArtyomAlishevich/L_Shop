<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин Настольных Игр</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="header">
    <div class="logo">BoardGames Shop</div>
    <div class="header-controls">
        <input type="text" id="searchInput" placeholder="Поиск игр...">
        <button id="searchBtn">Найти</button>
        <div class="cart-info" id="cartInfo">
            Корзина: <span id="cartCount">0</span> шт. (<span id="cartSum">0</span> ₽)
        </div>
        <button id="authBtn">Войти</button>
    </div>
</header>

<main class="main-container">
    <aside class="sidebar">
        <h3>Фильтры</h3>
        <label>
            <input type="checkbox" id="availableOnly"> В наличии
        </label>
        <button id="applyFilters">Применить</button>
    </aside>

    <section class="catalog">
        <div id="gamesGrid" class="games-grid">
        </div>
    </section>
</main>

<div id="authModal" class="modal hidden">
    <div class="modal-content">
        <span class="close-btn" id="closeAuth">&times;</span>
        <h2>Вход</h2>
        <form id="loginForm">
            <input type="text" id="loginInput" placeholder="Логин" required>
            <input type="password" id="passwordInput" placeholder="Пароль" required>
            <button type="submit">Войти</button>
        </form>
    </div>
</div>

<script src="app.js"></script>

<div id="cartModal" class="modal hidden">
    <div class="modal-content cart-content">
        <span class="close-btn" id="closeCart">&times;</span>
        <h2>Твоя корзина</h2>

        <div id="cartItemsList" class="cart-items">
        </div>

        <div class="cart-summary">
            <p>Итого: <span id="cartTotalSum">0</span> ₽</p>
            <button id="clearCartBtn" class="btn-danger">Очистить корзину</button>
        </div>

        <hr>

        <h3>Оформление доставки</h3>
        <form id="deliveryForm">
            <div class="form-group">
                <input type="text" id="delPhone" placeholder="Телефон" required>
                <input type="email" id="delEmail" placeholder="Email" required>
            </div>
            <div class="form-group">
                <input type="text" id="delCountry" placeholder="Страна" required>
                <input type="text" id="delCity" placeholder="Город" required>
            </div>
            <div class="form-group">
                <input type="text" id="delStreet" placeholder="Улица" required>
                <input type="text" id="delHouse" placeholder="Дом" required>
                <input type="text" id="delApartment" placeholder="Квартира (необязательно)">
            </div>
            <div class="form-group">
                <select id="delPayment" required>
                    <option value="" disabled selected>Способ оплаты</option>
                    <option value="card">Карта</option>
                    <option value="cash">Наличные</option>
                    <option value="online">Онлайн</option>
                </select>
            </div>
            <button type="submit" class="btn-success">Оформить заказ</button>
        </form>
    </div>
</div>
</body>
</html>
